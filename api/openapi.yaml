      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeploymentResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Service not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/services/{id}/domains:
    post:
      operationId: createServiceDomain
      summary: Add a domain to a service
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDomainRequest"
      responses:
        "201":
          description: Domain added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceDomainResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Service not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Domain already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listServiceDomains
      summary: List domains for a service
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceDomainResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Service not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/services/{id}/domains/{domainId}:
    put:
      operationId: updateServiceDomain
      summary: Update domain settings
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: domainId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDomainRequest"
      responses:
        "200":
          description: Domain updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceDomainResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Domain not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteServiceDomain
      summary: Remove a domain from a service
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: domainId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Domain deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Domain not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/servers/check-connection:
    post:
      operationId: checkConnection
      summary: Test SSH connectivity to a server
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckConnectionRequest"
      responses:
        "200":
          description: Connection successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckConnectionResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: SSH connection test failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ssh-keys:
    post:
      operationId: createSSHKey
      summary: Store an SSH private key
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSSHKeyRequest"
      responses:
        "201":
          description: SSH key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKeyResponse"
        "400":
          description: Invalid request or key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listSSHKeys
      summary: List stored SSH keys
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of SSH keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SSHKeyResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ssh-keys/generate:
    post:
      operationId: generateSSHKey
      summary: Generate a new Ed25519 SSH keypair
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateSSHKeyRequest"
      responses:
        "201":
          description: SSH keypair generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKeyResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    User:
      type: object
      required:
        - id
        - email
        - platform_role
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        platform_role:
          type: string

    Workspace:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string

    AuthResponse:
      type: object
      required:
        - user
        - workspace
      properties:
        user:
          $ref: "#/components/schemas/User"
        workspace:
          $ref: "#/components/schemas/Workspace"

    LogoutResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    DeployRequest:
      type: object
      required:
        - service_id
      properties:
        service_id:
          type: string

    DeployResponse:
      type: object
      required:
        - deployment_id
      properties:
        deployment_id:
          type: string

    DeploymentResponse:
      type: object
      required:
        - id
        - status
        - service_id
        - created_at
      properties:
        id:
          type: string
        status:
          type: string
          enum:
            - in_progress
            - success
            - failed
        service_id:
          type: string
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    CreateSSHKeyRequest:
      type: object
      required:
        - name
        - private_key
      properties:
        name:
          type: string
        private_key:
          type: string

    GenerateSSHKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    CheckConnectionRequest:
      type: object
      required:
        - host
        - ssh_user
        - ssh_key_id
      properties:
        host:
          type: string
        port:
          type: integer
          default: 22
        ssh_user:
          type: string
        ssh_key_id:
          type: string

    CheckConnectionResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    SSHKeyResponse:
      type: object
      required:
        - id
        - name
        - public_key
        - created_at
      properties:
        id:
          type: string
        name:
          type: string
        public_key:
          type: string
          description: "OpenSSH authorized_keys format public key derived from the stored private key"
        created_at:
          type: string
          format: date-time

    CreateServerRequest:
      type: object
      required:
        - name
        - host
        - ssh_user
        - ssh_key_id
      properties:
        name:
          type: string
        host:
          type: string
        port:
          type: integer
          default: 22
        ssh_user:
          type: string
        ssh_key_id:
          type: string

    ServerResponse:
      type: object
      required:
        - id
        - name
        - host
        - port
        - ssh_user
        - ssh_key_id
        - proxy_status
        - created_at
      properties:
        id:
          type: string
        name:
          type: string
        host:
          type: string
        port:
          type: integer
        ssh_user:
          type: string
        ssh_key_id:
          type: string
        proxy_status:
          type: string
          enum:
            - not_configured
            - ready
            - port_conflict
            - degraded
        proxy_last_reconciled_at:
          type: string
          format: date-time
        proxy_last_error:
          type: string
        created_at:
          type: string
          format: date-time

    LogEntry:
      type: object
      required:
        - id
        - order
        - created_at
        - output
        - type
        - phase
      properties:
        id:
          type: integer
          format: int64
        order:
          type: integer
        created_at:
          type: string
          format: date-time
        output:
          type: string
        type:
          type: string
          enum:
            - stdout
            - stderr
        phase:
          type: string
          description: Structured deploy phase identifier. Empty string for raw command output.

    ProjectResponse:
      type: object
      required:
        - id
        - name
        - workspace_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
        name:
          type: string
        workspace_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      description: |
        Request body for creating a project. When `name` is omitted, blank, or
        whitespace-only, the backend generates a unique Railway-style
        `adjective-noun` name scoped to the workspace.
      properties:
        name:
          type: string

    UpdateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    CreateProjectFromImageRequest:
      type: object
      required:
        - server_id
        - image
        - port
      properties:
        server_id:
          type: string
        image:
          type: string
          description: Docker image reference, e.g. `nginx:latest` or `ghcr.io/owner/repo:tag`.
        port:
          type: integer
          description: Container port the service listens on.

    CreateProjectFromImageResponse:
      type: object
      required:
        - project
        - environment
        - service
      properties:
        project:
          $ref: "#/components/schemas/ProjectResponse"
        environment:
          $ref: "#/components/schemas/EnvironmentResponse"
        service:
          $ref: "#/components/schemas/ServiceResponse"

    EnvironmentResponse:
      type: object
      required:
        - id
        - name
        - project_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
        name:
          type: string
        project_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateEnvironmentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    UpdateEnvironmentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    CreateServiceRequest:
      type: object
      required:
        - name
        - image
        - container_name
        - port
        - server_id
        - environment_id
      properties:
        name:
          type: string
        image:
          type: string
        container_name:
          type: string
        port:
          type: integer
        server_id:
          type: string
        environment_id:
          type: string
        kind:
          type: string
          default: application
          enum:
            - application

    UpdateServiceRequest:
      type: object
      required:
        - name
        - image
        - container_name
        - port
        - server_id
      properties:
        name:
          type: string
        image:
          type: string
        container_name:
          type: string
        port:
          type: integer
        server_id:
          type: string

    ServiceResponse:
      type: object
      required:
        - id
        - name
        - image
        - container_name
        - port
        - server_id
        - kind
        - project_id
        - environment_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        container_name:
          type: string
        port:
          type: integer
        server_id:
          type: string
        kind:
          type: string
          enum:
            - application
        project_id:
          type: string
        environment_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDomainRequest:
      type: object
      required:
        - domain
      properties:
        domain:
          type: string

    UpdateDomainRequest:
      type: object
      required:
        - is_primary
      properties:
        is_primary:
          type: boolean

    ServiceDomainResponse:
      type: object
      required:
        - id
        - domain
        - is_primary
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        domain:
          type: string
        is_primary:
          type: boolean
        status:
          type: string
          enum:
            - pending
            - ready
            - error
        last_error:
          type: string
        last_reconciled_at:
          type: string
          format: date-time
        ready_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpsertEnvRequest:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
        value:
          type: string

    ServiceEnvResponse:
      type: object
      required:
        - id
        - key
        - value
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        key:
          type: string
        value:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
