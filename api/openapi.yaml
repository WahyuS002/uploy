openapi: "3.0.3"
info:
  title: Uploy API
  version: 0.1.0
  description: Uploy deployment platform API

paths:
  /api/auth/register:
    post:
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login:
    post:
      operationId: login
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/me:
    get:
      operationId: getMe
      summary: Get current user and workspace info
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/logout:
    post:
      operationId: logout
      summary: Logout current session
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/deployments:
    post:
      operationId: createDeployment
      summary: Create a new deployment
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployRequest"
      responses:
        "200":
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/deployments/{id}/logs:
    get:
      operationId: getDeploymentLogs
      summary: Stream deployment logs via SSE
      description: |
        Returns a Server-Sent Events stream. OpenAPI does not natively model SSE,
        so this endpoint is documented for reference only.

        **SSE events (not modeled by this schema):**
        - Default message event: JSON-encoded LogEntry
        - `done` event: deployment final status string ("success" or "failed")
        - `stream-error` event: JSON object with "message" field
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE log stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/LogEntry"
        "400":
          description: Invalid deployment ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/servers:
    post:
      operationId: createServer
      summary: Register a new server
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServerRequest"
      responses:
        "201":
          description: Server created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: SSH connection test failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listServers
      summary: List registered servers
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServerResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ssh-keys:
    post:
      operationId: createSSHKey
      summary: Store an SSH private key
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSSHKeyRequest"
      responses:
        "201":
          description: SSH key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKeyResponse"
        "400":
          description: Invalid request or key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listSSHKeys
      summary: List stored SSH keys
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of SSH keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SSHKeyResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    User:
      type: object
      required:
        - id
        - email
        - platform_role
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        platform_role:
          type: string

    Workspace:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string

    AuthResponse:
      type: object
      required:
        - user
        - workspace
      properties:
        user:
          $ref: "#/components/schemas/User"
        workspace:
          $ref: "#/components/schemas/Workspace"

    LogoutResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    DeployRequest:
      type: object
      required:
        - image
        - container_name
        - port
        - server
      properties:
        image:
          type: string
        container_name:
          type: string
        port:
          type: integer
        server:
          type: object
          required:
            - host
            - port
            - user
            - private_key
          properties:
            host:
              type: string
            port:
              type: integer
            user:
              type: string
            private_key:
              type: string

    DeployResponse:
      type: object
      required:
        - deployment_id
      properties:
        deployment_id:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    CreateSSHKeyRequest:
      type: object
      required:
        - name
        - private_key
      properties:
        name:
          type: string
        private_key:
          type: string

    SSHKeyResponse:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time

    CreateServerRequest:
      type: object
      required:
        - name
        - host
        - ssh_user
        - ssh_key_id
      properties:
        name:
          type: string
        host:
          type: string
        port:
          type: integer
          default: 22
        ssh_user:
          type: string
        ssh_key_id:
          type: string

    ServerResponse:
      type: object
      required:
        - id
        - name
        - host
        - port
        - ssh_user
        - ssh_key_id
        - created_at
      properties:
        id:
          type: string
        name:
          type: string
        host:
          type: string
        port:
          type: integer
        ssh_user:
          type: string
        ssh_key_id:
          type: string
        created_at:
          type: string
          format: date-time

    LogEntry:
      type: object
      required:
        - id
        - order
        - created_at
        - output
        - type
      properties:
        id:
          type: integer
          format: int64
        order:
          type: integer
        created_at:
          type: string
          format: date-time
        output:
          type: string
        type:
          type: string
          enum:
            - stdout
            - stderr
